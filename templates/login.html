<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内システム — ログイン</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      color: #c9d1d9;
    }
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1f6feb, #388bfd, #58a6ff);
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 40px 36px 32px;
    }
    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 12px;
      font-size: 26px;
      margin-bottom: 14px;
    }
    .system-name { font-size: 20px; font-weight: 700; color: #f0f6fc; letter-spacing: 0.02em; }
    .system-sub { font-size: 12px; color: #8b949e; margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
    .divider { border: none; border-top: 1px solid #21262d; margin: 0 0 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #8b949e; letter-spacing: 0.04em; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #f0f6fc;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
    }
    button[type="submit"] {
      width: 100%;
      padding: 10px;
      background: #1f6feb;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    button[type="submit"]:hover { background: #388bfd; }
    .error {
      background: #1c1313;
      border: 1px solid #6e2020;
      border-radius: 6px;
      color: #f85149;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .notice {
      margin-top: 24px;
      padding: 12px 14px;
      background: #0c1821;
      border: 1px solid #1f3552;
      border-radius: 6px;
      font-size: 12px;
      color: #58a6ff;
      line-height: 1.6;
    }
    .notice strong { color: #79c0ff; }
    .footer { margin-top: 32px; font-size: 11px; color: #484f58; text-align: center; }
  </style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="card">
    <div class="logo-area">
      <div class="logo-icon">⚙</div>
      <div class="system-name">社内管理システム</div>
      <div class="system-sub">Internal Management System</div>
    </div>
    <hr class="divider">
    {% if error %}
    <div class="error">ユーザー ID またはパスワードが正しくありません。</div>
    {% endif %}
    <form method="post" action="{{ login_action }}">
      <label>ユーザー ID</label>
      <input type="text" name="username" placeholder="username" autocomplete="username" required>
      <label>パスワード</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      <button type="submit">ログイン</button>
    </form>
    <div class="notice">
      <strong>⚠ 注意事項</strong><br>
      このシステムは社内関係者専用です。<br>
      不正アクセスは禁止されています。
    </div>
  </div>
  <div class="footer">© 2024 Internal Systems — Authorized Personnel Only</div>
</body>
</html>
