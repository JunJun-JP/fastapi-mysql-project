<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>社内管理システム — API Docs</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{display:flex;min-height:100vh;background:#0d1117;font-family:'Segoe UI','Hiragino Sans',sans-serif;}

/* ── Sidebar ── */
.sidebar{
  width:220px;flex-shrink:0;background:#161b22;border-right:1px solid #21262d;
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;
}
.sidebar-logo{
  padding:20px 16px 16px;border-bottom:1px solid #21262d;
}
.sidebar-logo .icon{
  width:36px;height:36px;background:linear-gradient(135deg,#1f6feb,#388bfd);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:10px;
}
.sidebar-logo .title{font-size:13px;font-weight:700;color:#f0f6fc;line-height:1.3;}
.sidebar-logo .sub{font-size:10px;color:#8b949e;margin-top:2px;letter-spacing:.05em;text-transform:uppercase;}
.nav{padding:12px 8px;flex:1;overflow-y:auto;}
.nav-label{font-size:10px;color:#484f58;letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 4px;}
.nav a{
  display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;
  font-size:12px;color:#8b949e;text-decoration:none;transition:all .15s;margin-bottom:2px;
}
.nav a:hover{background:#21262d;color:#f0f6fc;}
.nav a.active{background:#1f3552;color:#58a6ff;}
.nav .badge{
  margin-left:auto;font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600;
}
.badge.get{background:#0c2a3a;color:#388bfd;}
.badge.post{background:#0d2b1a;color:#2ea043;}
.sidebar-footer{
  padding:12px 16px;border-top:1px solid #21262d;
}
.sidebar-footer a{
  display:block;font-size:11px;color:#8b949e;text-decoration:none;padding:4px 0;
}
.sidebar-footer a:hover{color:#f85149;}

/* ── Main ── */
.main{margin-left:220px;flex:1;display:flex;flex-direction:column;}
.topbar-custom{
  background:#161b22;border-bottom:1px solid #21262d;
  padding:10px 24px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:50;
}
.topbar-custom .version{
  background:#1f3552;color:#58a6ff;font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:4px;
}
.topbar-custom .oas{
  background:#0d2b1a;color:#2ea043;font-size:11px;font-weight:600;
  padding:2px 8px;border-radius:4px;
}
.topbar-custom .spacer{flex:1;}
.topbar-custom .dash-btn{
  font-size:12px;padding:5px 12px;background:#1f6feb;border:none;border-radius:6px;
  color:#fff;cursor:pointer;text-decoration:none;
}
.topbar-custom .dash-btn:hover{background:#388bfd;}

.swagger-wrap{padding:24px;max-width:960px;}

/* ── Swagger UI overrides ── */
.swagger-ui{color:#c9d1d9;}
.swagger-ui .scheme-container,
.swagger-ui .topbar{display:none!important;}
.swagger-ui .info{margin:0 0 24px;}
.swagger-ui .info .title{color:#f0f6fc;font-size:22px;}
.swagger-ui .info a{color:#58a6ff;}
.swagger-ui .info p,.swagger-ui .info li{color:#8b949e;}
.swagger-ui .info .base-url{color:#8b949e;font-size:12px;}
.swagger-ui section.models{display:none;}

.swagger-ui .opblock-tag{
  border:none!important;border-bottom:1px solid #21262d!important;
  color:#f0f6fc!important;font-size:14px!important;margin-bottom:4px;
}
.swagger-ui .opblock-tag:hover{background:#161b22!important;}
.swagger-ui .opblock-tag-section{background:transparent;}

.swagger-ui .opblock{
  border-radius:8px!important;border:1px solid #21262d!important;
  margin-bottom:8px!important;box-shadow:none!important;background:#161b22!important;
}
.swagger-ui .opblock .opblock-summary{border-radius:7px!important;}
.swagger-ui .opblock .opblock-summary-method{
  border-radius:5px!important;font-size:11px!important;min-width:58px!important;
  text-align:center;font-weight:700;
}
.swagger-ui .opblock.opblock-get{border-left:3px solid #388bfd!important;}
.swagger-ui .opblock.opblock-post{border-left:3px solid #2ea043!important;}
.swagger-ui .opblock.opblock-delete{border-left:3px solid #f85149!important;}
.swagger-ui .opblock.opblock-put{border-left:3px solid #d29922!important;}
.swagger-ui .opblock.opblock-patch{border-left:3px solid #a371f7!important;}
.swagger-ui .opblock.opblock-get .opblock-summary-method{background:#1f3552;color:#58a6ff;}
.swagger-ui .opblock.opblock-post .opblock-summary-method{background:#0d2b1a;color:#2ea043;}
.swagger-ui .opblock.opblock-delete .opblock-summary-method{background:#2d0f0f;color:#f85149;}
.swagger-ui .opblock .opblock-summary-path{color:#e6edf3!important;font-size:13px!important;}
.swagger-ui .opblock .opblock-summary-description{color:#8b949e!important;font-size:12px!important;}
.swagger-ui .opblock-body{background:#0d1117!important;border-radius:0 0 7px 7px;}
.swagger-ui .opblock-description-wrapper p,
.swagger-ui .opblock-external-docs-wrapper p,
.swagger-ui .opblock-title_normal p{color:#8b949e;}
.swagger-ui .tab li{color:#8b949e;}
.swagger-ui .tab li.active{color:#58a6ff;border-bottom-color:#58a6ff;}
.swagger-ui table thead tr th{color:#8b949e;border-bottom:1px solid #21262d;}
.swagger-ui table tbody tr td{color:#c9d1d9;border-bottom:1px solid #21262d;}
.swagger-ui .parameter__name{color:#e6edf3;}
.swagger-ui .parameter__type{color:#58a6ff;}
.swagger-ui input[type=text],.swagger-ui textarea,.swagger-ui select{
  background:#0d1117!important;border:1px solid #30363d!important;
  color:#f0f6fc!important;border-radius:6px!important;
}
.swagger-ui .btn{border-radius:6px!important;}
.swagger-ui .btn.execute{
  background:#1f6feb!important;border-color:#1f6feb!important;color:#fff!important;
}
.swagger-ui .btn.execute:hover{background:#388bfd!important;}
.swagger-ui .btn.cancel{border-color:#30363d!important;color:#8b949e!important;}
.swagger-ui .response-col_status{color:#2ea043;}
.swagger-ui .highlight-code{background:#0d1117!important;border-radius:6px;}
.swagger-ui .microlight{color:#e6edf3;}
.swagger-ui .model-box{background:#161b22;border-radius:6px;}
.swagger-ui section.models .model-container{background:#161b22;}
.swagger-ui .arrow{fill:#58a6ff;}
.swagger-ui select{appearance:auto;}
.swagger-ui .response-control-media-type__accept-message{color:#8b949e;}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="icon">⚙</div>
    <div class="title">社内管理システム</div>
    <div class="sub">API Reference</div>
  </div>
  <nav class="nav">
    <div class="nav-label">Endpoints</div>
    <a href="#" class="active">
      <span style="color:#2ea043">●</span> dashboard
      <span class="badge get">GET</span>
    </a>
    <a href="#">
      <span style="color:#388bfd">●</span> users
      <span class="badge get">GET</span>
    </a>
    <a href="#">
      <span style="color:#2ea043">●</span> users
      <span class="badge post">POST</span>
    </a>
    <a href="#">
      <span style="color:#388bfd">●</span> audit-logs
      <span class="badge get">GET</span>
    </a>
    <a href="#">
      <span style="color:#388bfd">●</span> audit-findings
      <span class="badge get">GET</span>
    </a>
    <a href="#">
      <span style="color:#388bfd">●</span> risk-scores
      <span class="badge get">GET</span>
    </a>
    <a href="#">
      <span style="color:#2ea043">●</span> run-audit
      <span class="badge post">POST</span>
    </a>
    <a href="#">
      <span style="color:#a371f7">●</span> ai-detect
      <span class="badge post">POST</span>
    </a>
    <div class="nav-label" style="margin-top:12px;">Links</div>
    <a href="/dashboard">📊 Dashboard</a>
  </nav>
  <div class="sidebar-footer">
    <a href="/docs/logout">← ログアウト</a>
  </div>
</div>

<div class="main">
  <div class="topbar-custom">
    <span style="font-size:13px;font-weight:600;color:#f0f6fc;">API Reference</span>
    <span class="version">v0.1.0</span>
    <span class="oas">OAS 3.1</span>
    <span class="spacer"></span>
    <a href="/dashboard" class="dash-btn">📊 Dashboard</a>
  </div>
  <div class="swagger-wrap">
    <div id="swagger-ui"></div>
  </div>
</div>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
SwaggerUIBundle({
  url: '/openapi.json',
  dom_id: '#swagger-ui',
  deepLinking: true,
  presets: [SwaggerUIBundle.presets.apis],
  layout: 'BaseLayout',
  defaultModelsExpandDepth: -1,
  docExpansion: 'list',
  tryItOutEnabled: true,
})
</script>
</body>
</html>
